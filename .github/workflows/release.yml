name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Install appimagetool
        run: |
          sudo wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          sudo chmod +x /usr/local/bin/appimagetool

      - name: Build with PyInstaller
        run: uv run pyinstaller pagb.spec --noconfirm

      - name: Build AppImage
        run: uv run bash packaging/build-appimage.sh
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"

      - name: Package Linux archive
        run: cd dist && tar czf ../pagb-reconstruction-linux-x86_64.tar.gz pagb-reconstruction/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            pagb-reconstruction-linux-x86_64.tar.gz
            *.AppImage

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build with PyInstaller (directory)
        run: uv run pyinstaller pagb.spec --noconfirm

      - name: Build with PyInstaller (onefile)
        run: uv run pyinstaller pagb-onefile.spec --noconfirm --distpath dist-onefile

      - name: Package Windows archive
        run: Compress-Archive -Path dist\pagb-reconstruction -DestinationPath pagb-reconstruction-windows-x86_64.zip
        shell: pwsh

      - name: Copy exe to root
        run: copy dist-onefile\pagb-reconstruction.exe pagb-reconstruction.exe
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            pagb-reconstruction-windows-x86_64.zip
            pagb-reconstruction.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
